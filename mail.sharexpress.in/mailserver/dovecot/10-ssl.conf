# ─────────────────────────────────────────────────────────────────────────────
# Dovecot SSL/TLS Configuration (10-ssl.conf)
# ─────────────────────────────────────────────────────────────────────────────

# Enforce TLS encryption for incoming connection
ssl = required

# SSL keys (dovecot requires '<' character prefix to read file content)
ssl_cert = </etc/dovecot/ssl/fullchain.pem
ssl_key = </etc/dovecot/ssl/privkey.pem

# Cipher suite settings (Modern security protocols only)
ssl_min_protocol = TLSv1.2
ssl_cipher_list = EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH
ssl_prefer_server_ciphers = yes
