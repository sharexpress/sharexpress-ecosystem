# ─────────────────────────────────────────────────────────────────────────────
# Dovecot Mailbox Location & Format (10-mail.conf)
# ─────────────────────────────────────────────────────────────────────────────

# Standard Maildir location under virtual host directories
# %d = domain (e.g. sharexpress.in), %n = user localpart
mail_location = maildir:/var/mail/vhosts/%d/%n

# Primary ID bounds for security
first_valid_uid = 5000
last_valid_uid = 5000
first_valid_gid = 5000
last_valid_gid = 5000

# Access permissions
mail_privileged_group = vmail
mail_access_groups = vmail

# Directory layout structure (maildir folders start with dots: .Drafts, .Sent)
namespace inbox {
  inbox = yes

  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
  
  mailbox Junk {
    special_use = \Junk
    auto = subscribe
  }
  
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  
  mailbox Archive {
    special_use = \Archive
    auto = subscribe
  }
}
