# ─────────────────────────────────────────────────────────────────────────────
# Dovecot Authentication Configuration (10-auth.conf) — Production
# ─────────────────────────────────────────────────────────────────────────────

# NEVER allow plaintext auth without TLS — this is non-negotiable
disable_plaintext_auth = yes

# Authentication mechanisms (PLAIN and LOGIN are the standard, but require TLS)
auth_mechanisms = plain login

# Brute force protection — fail2ban-compatible logging
auth_verbose = yes
auth_verbose_passwords = no        # NEVER log actual passwords
auth_failure_delay = 2s            # Add delay on failed auth attempts

# Password database
passdb {
  driver = passwd-file
  args = scheme=SHA512-CRYPT username_format=%u /etc/dovecot/users
  # Performance: cache the results for 60 seconds
  override_fields = password_noscheme=n
}

# User database
userdb {
  driver = passwd-file
  args = username_format=%u /etc/dovecot/users
  # Default fields for vmail storage
  default_fields = uid=5000 gid=5000 home=/var/mail/vhosts/%d/%n mail=maildir:/var/mail/vhosts/%d/%n
}
