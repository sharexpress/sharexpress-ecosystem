# ─────────────────────────────────────────────────────────────────────────────
# OpenDKIM Configuration — mail.sharexpress.in
# RFC 6376 compliant DKIM signing milter for Postfix
# ─────────────────────────────────────────────────────────────────────────────

# Mode: s = sign outgoing mail, v = verify incoming mail
Mode                    sv

# Logging
Syslog                  yes
SyslogSuccess           yes
LogWhy                  yes

# Signing algorithm (RSA-SHA256 per RFC 6376)
SignatureAlgorithm      rsa-sha256

# Canonicalization (relaxed/relaxed is most compatible and survives header rewrites)
Canonicalization        relaxed/relaxed

# Domain configuration files
KeyTable                /etc/opendkim/keytable
SigningTable            refile:/etc/opendkim/signingtable
ExternalIgnoreList      /etc/opendkim/trustedhosts
InternalHosts           /etc/opendkim/trustedhosts

# DKIM key minimum length (2048 bits minimum for production)
MinimumKeyBits          1024

# Socket for Postfix milter communication
Socket                  inet:12301@localhost

# PID file
PidFile                 /var/run/opendkim/opendkim.pid

# Run as user opendkim
UserID                  opendkim

# Trust sender's From header if DKIM/SPF aligned
OversignHeaders         From

# Add signature to headers (standard set)
SignHeaders             From,To,Cc,Subject,Date,Message-ID,MIME-Version,Content-Type

# Don't sign these headers if present (they change in transit)
# SkipHeaders           X-Spam-Status,X-Spam-Score

# Required DKIM headers for strict alignment with DMARC
RequiredHeaders         yes

# Only sign mail from authorized internal hosts
On-Default              reject

# Operational settings
Umask                   0022
