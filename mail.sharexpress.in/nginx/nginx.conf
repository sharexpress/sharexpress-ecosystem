user nginx;
worker_processes auto;
worker_rlimit_nofile 65536;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_body_timeout 15;
    client_header_timeout 15;
    send_timeout 15;
    types_hash_max_size 4096;
    server_tokens off;            # Hide nginx version from headers

    # ─── Buffer Sizes ───────────────────────────────────────────────────────────
    client_body_buffer_size 128k;
    client_max_body_size 30M;
    client_header_buffer_size 8k;
    large_client_header_buffers 4 32k;
    output_buffers 2 64k;

    # ─── Gzip Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        font/woff2;

    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    # General API: 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    # Login: 5 requests/minute per IP (brute force protection)
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
    # Compose/Send: 30 emails/minute per IP
    limit_req_zone $binary_remote_addr zone=api_send:10m rate=30r/m;

    # Connection limits per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ─── SSL Global Settings ──────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ─── Upstream Definitions ─────────────────────────────────────────────────
    upstream backend_pool {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    upstream frontend_pool {
        server frontend:80;
        keepalive 16;
    }

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
