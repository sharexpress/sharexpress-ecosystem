# ─────────────────────────────────────────────────────────────────────────────
# Dovecot main dovecot.conf Configuration — mail.sharexpress.in
# ─────────────────────────────────────────────────────────────────────────────

# Protocols enabled
protocols = imap pop3 lmtp

# Listen on all interfaces
listen = *

# Logging to stdout for Docker log aggregation
log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout

# Base directories
state_dir = /var/run/dovecot

# Import configurations
!include /etc/dovecot/custom/10-auth.conf
!include /etc/dovecot/custom/10-mail.conf
!include /etc/dovecot/custom/10-ssl.conf
!include /etc/dovecot/custom/10-master.conf

# Greeting banner
login_greeting = ShareXpress IMAP/POP3 Server Ready.
