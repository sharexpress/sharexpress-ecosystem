# ─────────────────────────────────────────────────────────────────────────────
# Dovecot Master Services Configuration (10-master.conf) — Production
# Concurrency limits, connection caps, timeout tuning
# ─────────────────────────────────────────────────────────────────────────────

# IMAP listeners
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }

  # Concurrency: max 1000 simultaneous login attempts per process
  service_count = 1               # One connection per process (most secure)
  process_min_avail = 5           # Pre-spawn 5 processes for fast login
  client_limit = 1000             # Max 1000 queued IMAP clients
  vsz_limit = 64M                 # Memory limit per login process
}

# POP3 listeners
service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
  process_min_avail = 2
  client_limit = 200
}

# IMAP session service (post-login, actual email access)
service imap {
  process_limit = 512             # Max 512 simultaneous IMAP sessions
  vsz_limit = 256M                # Memory limit per IMAP process
}

# POP3 session service
service pop3 {
  process_limit = 100
}

# LMTP service (receives mail from Postfix)
service lmtp {
  inet_listener lmtp {
    port = 2400
  }
  process_min_avail = 2
  service_count = 0               # Persistent process (better performance)
  process_limit = 20              # Max 20 simultaneous deliveries
}

# Auth service (Dovecot SASL for Postfix)
service auth {
  inet_listener {
    port = 12345
  }
  # Unix socket for internal Dovecot use
  unix_listener auth-userdb {
    mode = 0600
    user = dovecot
    group = dovecot
  }
  process_limit = 50              # Max 50 auth processes
  client_limit = 1000
}

# Auth worker
service auth-worker {
  user = root
  process_limit = 50
}

# Dict service
service dict {
  unix_listener dict {
    mode = 0600
    user = dovecot
  }
}

# Connection timeouts
# Kick idle IMAP connections after 30 minutes
imap_idle_notify_interval = 2 mins
