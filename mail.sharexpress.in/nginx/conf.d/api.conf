# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.mail.sharexpress.in;
    return 301 https://$host$request_uri;
}

# HTTPS FastAPI Backend API
server {
    listen 443 ssl http2;
    server_name api.mail.sharexpress.in;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/api_access.log main;
    error_log  /var/log/nginx/api_error.log warn;

    # Connection limit per IP
    limit_conn conn_per_ip 100;

    # ─── Rate-limited endpoints ───────────────────────────────────────────────

    # Login — strict brute-force protection (5 req/min)
    location = /api/v1/auth/login {
        limit_req zone=api_login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Email send — 30 per minute
    location ~ ^/api/v1/mail/(compose|draft) {
        limit_req zone=api_send burst=5 nodelay;
        limit_req_status 429;

        client_max_body_size 30M;

        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # General API (all other endpoints) — 60 req/min
    location / {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        client_max_body_size 30M;

        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Return JSON for rate limit errors
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"detail":"Rate limit exceeded. Please slow down.","status":429}';
    }
}
